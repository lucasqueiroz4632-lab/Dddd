<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porto Seguro | Menu Principal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-blue: #60a5fa;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Container do Vídeo de Fundo */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Garante que o vídeo cubra a tela toda sem distorcer */
        }

        /* Camada escura por cima do vídeo para dar leitura ao texto */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: 0;
        }

        /* Texto Estelar */
        .star-text {
            position: absolute;
            top: 15%;
            width: 100%;
            font-size: clamp(2rem, 8vw, 4rem);
            color: white;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            text-shadow: 0 0 15px #fff, 0 0 30px var(--neon-blue);
            font-weight: bold;
            z-index: 1;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-box {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 25px;
            width: 320px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .option-card:hover {
            transform: translateY(-15px) scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--neon-blue);
        }

        h3 { margin-bottom: 15px; font-size: 1.6rem; letter-spacing: 1px; }
        p { font-size: 1rem; opacity: 0.9; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline poster="backup-imagem.jpg">
            <source src="Agent_video_Pippit_20260426204124.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
        <div class="overlay"></div>
    </div>

    <div class="star-text">VOCÊ É INCRÍVEL</div>

    <div class="container">
        <div class="menu-box">
            <a href="falarcomia.html" class="option-card">
                <span style="font-size: 3rem;">🤖</span>
                <h3>Falar com a IA</h3>
                <p>Acolhimento imediato e escuta ativa a qualquer momento.</p>
            </a>
            
            <a href="falarcomserhumano.html" class="option-card">
                <span style="font-size: 3rem;">👤</span>
                <h3>Falar com Humano</h3>
                <p>Conecte-se comigo para uma conversa real e empática.</p>

</a>
        </div>
    </div>
</body>
</html>
