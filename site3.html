<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoio por Voz | Porto Seguro</title>
    <style>
        :root {
            --bg-calm: #0f172a;
            --accent-blue: #38bdf8;
            --soft-text: #cbd5e1;
        }
        body {
            margin: 0;
            background: var(--bg-calm);
            color: var(--soft-text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .call-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            max-width: 400px;
            width: 90%;
        }
        input {
            width: 80%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 1.1rem;
            text-align: center;
        }
        button {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .status { margin-top: 20px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>

<div class="call-card">
    <span style="font-size: 4rem;">📞</span>
    <h2>Queremos te ouvir</h2>
    <p>Insira seu número com DDD e enviaremos uma chamada de conforto imediata.</p>
    
    <input type="tel" id="phoneInput" placeholder="(00) 90000-0000">
    <br>
    <button onclick="requestCall()">Me ligue agora</button>
    
    <div id="statusMsg" class="status"></div>
    <br>
    <a href="menu.html" style="color: var(--accent-blue); text-decoration: none;">Voltar ao Menu</a>
</div>

<script>
async function requestCall() {
    const phone = document.getElementById('phoneInput').value;
    const status = document.getElementById('statusMsg');
    
    if (!phone) {
        status.innerText = "Por favor, insira um número válido.";
        return;
    }

    status.innerText = "Preparando conexão estelar... 🌌";

    try {
        // URL ATUALIZADA PARA NGROK
        const response = await fetch('https://flattered-snowsuit-referable.ngrok-free.dev/webhook/trigger-voice-call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ telefone: phone })
        });

        if (response.ok) {
            status.innerText = "Sucesso! Seu telefone tocará em instantes. 💙";
        } else {
            status.innerText = "Erro ao solicitar chamada. Tente novamente.";
        }
    } catch (error) {
        status.innerText = "Erro de conexão: verifique se o servidor n8n/ngrok está rodando.";
    }
}
</script>

</body>
</html>
